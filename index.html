async function loadTasks(){

  const[{data:tpl},{data:done}]=await Promise.all([
    sb.from('task_templates').select('*').eq('user_id',S.user.id).eq('active',true).order('sort_order'),

}
async function dbToggle(id){
  const task=S.tasks.find(t=>t.id===id);if(!task)return;
  const completing=!task.done;
  S.tasks=S.tasks.map(t=>t.id===id?{...t,done:!t.done}:t);render();
  if(completing){
    await sb.from('task_completions').insert({user_id:S.user.id,template_id:id,completed_date:todayISO()});
    const earned=XPMAP[task.difficulty]||10;
    const{data}=await sb.rpc('award_xp',{p_amount:earned});
    if(data?.[0])S.profile={...S.profile,...data[0]};
    showToast(`+${earned} XP! 🎉`);
  }else{
    await sb.from('task_completions').delete().eq('user_id',S.user.id).eq('template_id',id).eq('completed_date',todayISO());
    render();
  }
}
async function dbAdd(item){
  if(S.tasks.some(t=>t.text===item.text)){S.showAdd=false;render();return;}
  const{data,error}=await sb.from('task_templates').insert({
    user_id:S.user.id,category:item.category,emoji:item.emoji,text:item.text,
    time_min:item.time_min,difficulty:item.difficulty,energy_needed:item.energy_needed,
    habit_stack:item.habit_stack||'',sort_order:S.tasks.length+1,
  }).select().single();
  if(!error&&data)S.tasks=[...S.tasks,{...data,done:false}];
  S.showAdd=false;showToast('Task added ✓');
}
async function dbDump(content,mood){
  const{data,error}=await sb.from('brain_dumps').insert({user_id:S.user.id,content,mood}).select().single();
  if(!error&&data)S.dumps=[...S.dumps,data];
}
async function dbConvert(id){
  const item=S.dumps.find(d=>d.id===id);if(!item)return;
  S.dumps=S.dumps.map(d=>d.id===id?{...d,converted:true}:d);render();
  await sb.from('brain_dumps').update({converted:true}).eq('id',id);
  await dbAdd({emoji:'📝',text:item.content,category:'Productivity',time_min:5,difficulty:'medium',energy_needed:'medium',habit_stack:''});

/* ═══════════════════════════════════════════════════════════════
   TIMER
   ══════════════════════════════════════════════════════════════*/
function tmrStart(){
  if(_tmrI)return;TMR.running=true;render();
  _tmrI=setInterval(()=>{
    TMR.secs--;
    const d=document.getElementById('tmr-d');if(d)d.textContent=fmt(TMR.secs);
    const c=document.getElementById('tmr-c');
    if(c){const tot=TMR.phase==='work'?25*60:5*60,C=2*Math.PI*52;c.style.strokeDashoffset=C*(1-(tot-TMR.secs)/tot);}
    if(TMR.secs<=0){
      clearInterval(_tmrI);_tmrI=null;TMR.running=false;
      if(TMR.phase==='work'){TMR.tomatoes++;TMR.phase='break';TMR.secs=5*60;}
      else{TMR.phase='work';TMR.secs=25*60;}
      render();
    }
  },1000);
}
function tmrPause(){clearInterval(_tmrI);_tmrI=null;TMR.running=false;render();}
function tmrReset(){clearInterval(_tmrI);_tmrI=null;TMR.running=false;TMR.phase='work';TMR.secs=25*60;render();}

/* ═══════════════════════════════════════════════════════════════
   BOX BREATHING
   ══════════════════════════════════════════════════════════════*/
function breStart(){
  if(_breI||BRE.cycles>=4)return;BRE.running=true;render();
  _breI=setInterval(()=>{
    BRE.count--;
    if(BRE.count<=0){BRE.phase=(BRE.phase+1)%4;if(BRE.phase===0)BRE.cycles++;BRE.count=4;}
    if(BRE.cycles>=4){clearInterval(_breI);_breI=null;BRE.running=false;render();return;}
    const cE=document.getElementById('bre-c');if(cE)cE.textContent=BRE.count;
    const lE=document.getElementById('bre-l');if(lE){lE.textContent=BRE_PH[BRE.phase];lE.style.color=BRE_CL[BRE.phase];}
    const cy=document.getElementById('bre-cy');if(cy)cy.textContent=`${BRE.cycles}/4 cycles`;
  },1000);
}
function breStop(){clearInterval(_breI);_breI=null;BRE.running=false;render();}
function breReset(){clearInterval(_breI);_breI=null;BRE.running=false;BRE.phase=0;BRE.count=4;BRE.cycles=0;render();}

async function handleToggle(id){

function rCard(task,hl){
  const cat=CAT[task.category]||CAT['Mindfulness'];
  const df=DIFF[task.difficulty]||DIFF.easy;
  return`<div class="bg-white rounded-2xl px-4 py-3 shadow-sm flex items-center gap-3 ${task.done?'opacity-40':''}${hl?' border-l-4 border-emerald-300':''}">
    <span class="text-2xl leading-none flex-shrink-0">${task.emoji}</span>
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-1.5 mb-0.5 flex-wrap">
        <span class="font-black uppercase tracking-wider ${cat.c}" style="font-size:10px">${esc(task.category)}</span>
        <span class="font-bold px-1.5 py-0.5 rounded-full ${df.bg} ${df.c}" style="font-size:10px">${df.lbl}</span>
        <span class="text-gray-400 font-bold" style="font-size:10px">~${task.time_min}m</span>
      </div>
      <p class="font-bold text-gray-800 text-sm leading-snug ${task.done?'line-through text-gray-400':''}">${esc(task.text)}</p>
      ${task.habit_stack&&!task.done?`<p class="text-gray-400 mt-0.5 truncate" style="font-size:10px">📌 ${esc(task.habit_stack)}</p>`:''}
    </div>
    <button onclick="handleToggle('${task.id}')" class="w-7 h-7 rounded-lg border-2 flex items-center justify-center flex-shrink-0 ${task.done?'bg-blue-400 border-blue-400':'border-gray-200'}">
      ${task.done?'<span class="text-white font-black text-xs">✓</span>':''}
    </button>
  </div>`;
}

  const vis=S.tasks.filter(t=>t.category!=='Prayer'&&(ERANK[t.energy_needed]||2)<=cap+1);

  const done=S.tasks.filter(t=>t.done).length,total=S.tasks.length,p=pct(done,total);
  return`<div class="flex flex-col gap-3 px-4 py-4">

    <!-- Energy -->

        <div class="flex items-center gap-2.5">
          <span class="text-2xl">🕌</span>

        <div class="flex items-center gap-2">
          <span class="text-sm font-black ${allP?'text-teal-600':'text-gray-500'}">${pDone}/${prayers.length}</span>

      <div class="flex items-center justify-between mb-1.5">

      <div class="space-y-2">${quick.slice(0,3).map(t=>rCard(t,true)).join('')}</div></div>`:''}

    <button onclick="S.showAdd=true;render()" class="w-full flex items-center gap-2.5 bg-white rounded-2xl px-4 py-3 shadow-sm text-blue-500 font-black text-sm">

function rFocus(){
  const pend=S.tasks.filter(t=>!t.done);
  if(!pend.length)return`<div class="flex flex-col items-center justify-center py-16 px-6 text-center gap-4">
    <span class="text-7xl">🥳</span>
    <h2 class="text-2xl font-black text-gray-800">Every task complete!</h2>
    <p class="text-gray-500 font-semibold leading-relaxed">Your brain worked genuinely hard today. You've earned rest without guilt.</p>
    <div class="bg-violet-50 rounded-2xl p-4 text-left w-full">
      <p class="text-violet-600 font-black uppercase tracking-widest mb-2" style="font-size:11px">🧠 What just happened in your brain</p>
      <p class="text-gray-700 font-semibold text-sm leading-relaxed">Completing tasks triggered real dopamine releases all day. Your prefrontal cortex literally strengthened with each win. Rest now — it consolidates everything.</p>
    </div>
  </div>`;
  const idx=Math.min(S.focusIdx,pend.length-1),task=pend[idx];
  const cat=CAT[task.category]||CAT['Mindfulness'],df=DIFF[task.difficulty]||DIFF.easy;
  const C=2*Math.PI*52,tot=TMR.phase==='work'?25*60:5*60,col=TMR.phase==='work'?'#60a5fa':'#34d399';

    <div class="flex items-center justify-between">
      <p class="font-black text-gray-400 uppercase tracking-widest" style="font-size:11px">${pend.length} task${pend.length!==1?'s':''} remaining</p>
      <button onclick="handleShuffle()" class="font-black text-blue-500 bg-blue-50 rounded-full px-3 py-1.5" style="font-size:11px">🔀 Pick for me</button>
    </div>
    <div class="bg-white rounded-3xl p-5 shadow-md text-center">
      <span class="text-5xl block mb-3">${task.emoji}</span>
      <div class="flex items-center justify-center gap-2 mb-2">
        <span class="font-black uppercase tracking-wider ${cat.c}" style="font-size:10px">${task.category}</span>
        <span class="font-bold px-2 py-0.5 rounded-full ${df.bg} ${df.c}" style="font-size:10px">${df.lbl}</span>
      </div>
      <h2 class="text-xl font-black text-gray-800 leading-tight mb-1">${esc(task.text)}</h2>
      <p class="text-gray-400 font-semibold text-xs">~${task.time_min} min${task.time_min!==1?'s':''}</p>
      ${task.habit_stack?`<span class="inline-block mt-2 bg-gray-50 text-gray-400 font-semibold rounded-xl px-3 py-1.5" style="font-size:11px">📌 Best: ${esc(task.habit_stack)}</span>`:''}
    </div>
    <!-- Pomodoro -->
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="flex items-center justify-between mb-3">
        <p class="font-black uppercase tracking-widest ${TMR.phase==='work'?'text-blue-500':'text-emerald-500'}" style="font-size:11px">${TMR.phase==='work'?'🎯 Focus Session':'☕ Rest Break'}</p>
        ${TMR.tomatoes>0?`<span class="bg-red-50 text-red-500 font-black px-2.5 py-1 rounded-full" style="font-size:11px">🍅 ${TMR.tomatoes}</span>`:''}
      </div>
      <div class="relative mx-auto mb-4" style="width:128px;height:128px">
        <svg class="w-full h-full" style="transform:rotate(-90deg)" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#f3f4f6" stroke-width="8"/>
          <circle id="tmr-c" cx="60" cy="60" r="52" fill="none" stroke="${col}" stroke-width="8" stroke-linecap="round"
            stroke-dasharray="${C}" style="stroke-dashoffset:${C*(1-(tot-TMR.secs)/tot)};transition:stroke-dashoffset 1s linear"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span id="tmr-d" class="text-3xl font-black text-gray-800" style="font-variant-numeric:tabular-nums">${fmt(TMR.secs)}</span>
          <span class="text-gray-400 font-bold" style="font-size:10px">${TMR.phase==='work'?'stay focused':'you earned it'}</span>

      <div class="flex justify-center gap-2">

    </div>
    <div class="flex gap-2">
      <button onclick="S.showGround=!S.showGround;S.showBreath=false;S.showStuck=false;render()" class="flex-1 py-2 rounded-xl font-black ${S.showGround?'bg-violet-200 text-violet-700':'bg-violet-50 text-violet-600'}" style="font-size:11px">🌿 Ground Me</button>

    </div>`:''}
    ${S.showBreath?`<div class="bg-blue-50 border border-blue-100 rounded-2xl p-4">
      <div class="flex items-center justify-between mb-3">
        <p class="text-blue-700 font-black uppercase tracking-widest" style="font-size:11px">📦 Box Breathing 4-4-4-4</p>
        <button onclick="S.showBreath=false;breStop();render()" class="text-gray-400 font-black text-sm">✕</button>
      </div>

        <div class="w-20 h-20 mx-auto rounded-2xl bg-white border-4 border-blue-200 flex items-center justify-center mb-3">

        <p id="bre-l" class="text-lg font-black mb-1" style="color:${BRE_CL[BRE.phase]}">${BRE_PH[BRE.phase]}</p>
        <p id="bre-cy" class="text-xs text-gray-400 font-semibold">${BRE.cycles}/4 cycles${BRE.cycles>=4?' ✓ Complete':''}</p>

      <div class="flex items-center justify-between mb-3">
        <p class="text-violet-700 font-black uppercase tracking-widest" style="font-size:11px">🌿 5-4-3-2-1 Grounding</p>

      <div class="flex gap-1 mb-4">${GRND.map((_,i)=>`<div class="flex-1 rounded-full ${i<=S.groundStep?'bg-violet-400':'bg-violet-200'}" style="height:6px"></div>`).join('')}</div>
      <div class="text-center mb-3">
        <span class="text-4xl block mb-2">${GRND[S.groundStep].emoji}</span>
        <p class="text-violet-700 font-black text-sm">${GRND[S.groundStep].prompt}</p>
      </div>
      <textarea id="gr-inp" rows="2" placeholder="Type here..."
        class="w-full bg-white rounded-xl p-3 text-sm font-semibold text-gray-700 resize-none outline-none border border-violet-100">${esc(S.groundInputs[S.groundStep])}</textarea>
      <div class="flex gap-2 mt-2">
        ${S.groundStep>0?`<button onclick="saveGrnd();S.groundStep--;render()" class="flex-1 py-2 bg-violet-100 text-violet-600 font-black text-sm rounded-xl">← Back</button>`:''}

      </div>
    </div>`:''}
  </div>`;
}

function rDump(){
  const MOODS=[{id:'great',e:'😄',l:'Great'},{id:'okay',e:'😐',l:'Okay'},{id:'anxious',e:'😰',l:'Anxious'},{id:'sad',e:'😔',l:'Sad'},{id:'angry',e:'😠',l:'Angry'},{id:'overwhelmed',e:'🤯',l:'Whelmed'}];
  const pend=S.dumps.filter(d=>!d.converted);
  return`<div class="flex flex-col gap-3 px-4 py-4">
    <div class="bg-white rounded-2xl p-3.5 shadow-sm">
      <p class="font-black text-gray-400 uppercase tracking-widest mb-2.5" style="font-size:11px">💭 How are you feeling?</p>
      <div class="flex gap-1.5 flex-wrap">
        ${MOODS.map(m=>`<button onclick="S.dumpMood='${m.id}';render()" class="flex items-center gap-1 rounded-full px-2.5 py-1.5 border font-black ${S.dumpMood===m.id?'border-blue-300 bg-blue-50 text-blue-600':'border-gray-100 text-gray-500'}" style="font-size:11px">${m.e} ${m.l}</button>`).join('')}
      </div>
      ${S.dumpMood==='overwhelmed'?`<div class="mt-2.5 bg-violet-50 rounded-xl p-2.5"><p class="text-violet-700 font-bold leading-relaxed" style="font-size:11px">🌿 That's okay. Overwhelm is your brain's signal it's carrying too much. Dump everything below — getting it out of your head is the first step.</p></div>`:''}
      ${S.dumpMood==='anxious'?`<div class="mt-2.5 bg-blue-50 rounded-xl p-2.5"><p class="text-blue-700 font-bold leading-relaxed" style="font-size:11px">💨 Try 3 slow breaths first. Anxiety narrows focus — dumping your thoughts will help widen it again.</p></div>`:''}
    </div>
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <p class="font-black text-gray-400 uppercase tracking-widest mb-1" style="font-size:11px">🧠 Brain Dump</p>
      <p class="text-gray-400 font-semibold mb-3" style="font-size:11px">No filter. No judgment. One thought per line. Just get it out of your head.</p>
      <textarea id="dp-txt" rows="5" placeholder="Anything on your mind...&#10;Worries, ideas, to-dos...&#10;One thought per line."
        oninput="S.dumpText=this.value"
        class="w-full text-sm text-gray-800 font-semibold resize-none outline-none leading-relaxed">${esc(S.dumpText)}</textarea>
      <button onclick="handleDump()" class="mt-3 w-full bg-blue-500 text-white font-black text-sm py-2.5 rounded-xl shadow-md shadow-blue-100">Dump It 🧠</button>
      <p class="text-center text-gray-300 mt-2 font-semibold" style="font-size:10px">Clearing working memory reduces cognitive load</p>
    </div>
    ${S.dumps.length>0?`<div class="space-y-2">
      <p class="font-black text-gray-400 uppercase tracking-widest" style="font-size:11px">Captured (${pend.length} to process)</p>
      ${S.dumps.map(d=>`<div class="bg-white rounded-xl px-4 py-3 shadow-sm flex items-start gap-3 ${d.converted?'opacity-30':''}">
        <span class="text-gray-700 font-semibold text-sm flex-1 leading-snug">${esc(d.content)}</span>
        ${d.converted?'<span class="text-emerald-400 flex-shrink-0 mt-0.5">✓</span>':`<button onclick="dbConvert('${d.id}')" class="font-black text-blue-500 bg-blue-50 px-2.5 py-1 rounded-full flex-shrink-0 mt-0.5" style="font-size:11px;white-space:nowrap">→ Task</button>`}
      </div>`).join('')}
      ${pend.length>0?`<p class="text-gray-400 text-center font-semibold" style="font-size:10px">Tap "→ Task" to add anything to your task list</p>`:''}
    </div>`:`<div class="text-center py-8 text-gray-300"><span class="text-4xl block mb-2">🧠</span>
      <p class="text-sm font-semibold">Your captured thoughts will appear here</p>
      <p class="mt-1" style="font-size:11px">Externalizing thoughts frees up ADHD working memory</p>
    </div>`}
  </div>`;
}

function rWins(){
  const done=S.tasks.filter(t=>t.done).length,total=S.tasks.length,p=pct(done,total);
  const xp=S.profile.xp||0,streak=S.profile.current_streak||0;
  const level=Math.floor(xp/100)+1,lvlXP=xp%100,hardDone=S.tasks.filter(t=>t.done&&t.difficulty==='hard').length;
  const unlocked=ACHIEVEMENTS.filter(a=>a.check(S)),di=dayI();
  return`<div class="flex flex-col gap-3 px-4 py-4">
    <div class="bg-gradient-to-br from-violet-50 via-blue-50 to-fuchsia-50 rounded-2xl p-4 border border-violet-100">
      <p class="text-violet-600 font-black uppercase tracking-widest mb-2" style="font-size:11px">✨ Today's Affirmation</p>
      <p class="text-gray-800 font-black text-base leading-snug">"${AFFIRM[di%AFFIRM.length]}"</p>
    </div>
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <div class="flex items-center justify-between mb-2">
        <div><p class="font-black text-gray-800 text-base">Level ${level}</p><p class="text-gray-400 font-semibold" style="font-size:11px">${100-lvlXP} XP until next level</p></div>
        <div class="flex items-center gap-1.5 bg-amber-50 rounded-full px-3 py-1.5"><span>⭐</span><span class="font-black text-amber-600 text-sm">${xp} XP</span></div>
      </div>
      <div class="w-full bg-gray-100 rounded-full overflow-hidden" style="height:12px">
        <div class="h-full rounded-full transition-all duration-700" style="width:${lvlXP}%;background:linear-gradient(90deg,#f59e0b,#fbbf24)"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2">
      ${[{i:'🔥',v:streak,l:'Day Streak'},{i:'🏆',v:`${done}/${total}`,l:'Done Today'},{i:'⚡',v:`${p}%`,l:'Completed'},{i:'💪',v:hardDone,l:'Hard Wins'}].map(s=>`
        <div class="bg-white rounded-2xl p-4 shadow-sm text-center">
          <span class="text-2xl block mb-1">${s.i}</span>
          <p class="text-2xl font-black text-gray-800">${s.v}</p>
          <p class="text-gray-400 font-bold" style="font-size:11px">${s.l}</p>
        </div>`).join('')}
    </div>
    <div class="bg-white rounded-2xl p-4 shadow-sm">
      <p class="font-black text-gray-400 uppercase tracking-widest mb-3" style="font-size:11px">🏆 Achievements — ${unlocked.length}/${ACHIEVEMENTS.length} unlocked</p>
      <div class="grid grid-cols-4 gap-2">
        ${ACHIEVEMENTS.map(a=>{const got=unlocked.some(u=>u.id===a.id);return`<div title="${esc(a.label)}" class="rounded-xl p-2 text-center border ${got?'bg-amber-50 border-amber-100':'bg-gray-50 border-gray-100 opacity-35'}">
          <span class="text-2xl block">${a.emoji}</span>
          <p class="font-black text-gray-700 mt-1 leading-tight" style="font-size:9px">${a.label}</p>
        </div>`;}).join('')}
      </div>
    </div>
    <div class="bg-blue-50 rounded-2xl p-4 border border-blue-100">
      <p class="text-blue-600 font-black uppercase tracking-widest mb-2" style="font-size:11px">🔬 ADHD Science</p>
      <p class="text-gray-700 font-semibold text-sm leading-relaxed">${SCIENCE[di%SCIENCE.length]}</p>
    </div>
  </div>`;
}

function rAddSheet(){
  const added=new Set(S.tasks.map(t=>t.text));
  const cats=Object.keys(SUGG),items=SUGG[S.addCat]||[];
  return`<div class="fixed inset-0 z-50 flex flex-col justify-end" style="max-width:384px;left:50%;transform:translateX(-50%)">
    <div class="absolute inset-0 bg-black/25 backdrop-blur-sm" onclick="S.showAdd=false;render()"></div>
    <div class="relative bg-gray-50 rounded-t-3xl shadow-2xl flex flex-col z-10 slide-up" style="max-height:78vh">
      <div class="flex justify-center pt-3 pb-1"><div class="w-10 bg-gray-200 rounded-full" style="height:6px"></div></div>
      <div class="bg-white mx-3 rounded-2xl shadow-sm p-4 mb-2">
        <div class="flex items-center justify-between">
          <p class="font-black text-gray-800">Add a task</p>
          <button onclick="S.showAdd=false;render()" class="bg-gray-100 text-gray-500 font-black rounded-full px-3 py-1.5" style="font-size:11px">Close</button>
        </div>
        <p class="text-gray-400 font-semibold mt-1" style="font-size:11px">Tasks with time estimates help with ADHD time blindness.</p>
      </div>
      <div class="flex border-b border-gray-100 bg-white px-3">
        ${cats.map(c=>`<button onclick="S.addCat='${c}';render()" class="flex-1 font-black py-2.5 border-b-2 ${S.addCat===c?'border-blue-400 text-blue-500':'border-transparent text-gray-400'}" style="font-size:10px">${c}</button>`).join('')}
      </div>
      <div class="overflow-y-auto flex-1 p-3 space-y-2">
        ${items.map((item,idx)=>{const a=added.has(item.text),d=DIFF[item.difficulty]||DIFF.easy;return`<button onclick="${a?'':(`handleAddByIdx('${S.addCat}',${idx})`)}" ${a?'disabled':''} class="w-full bg-white rounded-2xl px-4 py-3 flex items-center gap-3 shadow-sm text-left ${a?'opacity-40 cursor-default':'hover:shadow-md'}">
          <span class="text-xl flex-shrink-0">${item.emoji}</span>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-1.5 mb-0.5">
              <span class="font-bold px-1.5 py-0.5 rounded-full ${d.bg} ${d.c}" style="font-size:10px">${d.lbl}</span>
              <span class="text-gray-400 font-bold" style="font-size:10px">~${item.time_min}m</span>
            </div>
            <span class="font-bold text-gray-800 text-sm">${esc(item.text)}</span>
          </div>
          ${a?'<span class="text-emerald-400">✓</span>':'<span class="text-gray-300">+</span>'}
        </button>`;}).join('')}
      </div>
    </div>
  </div>`;
}

function rApp(){
  const done=S.tasks.filter(t=>t.done).length,total=S.tasks.length,p=pct(done,total);
  const TABS=[{id:'today',icon:'🏠',lbl:'Today'},{id:'focus',icon:'🎯',lbl:'Focus'},{id:'dump',icon:'🧠',lbl:'Dump'},{id:'wins',icon:'⭐',lbl:'Wins'}];
  return`
  ${S.toast?`<div class="fixed top-4 z-50 bg-blue-500 text-white text-sm font-black px-4 py-2.5 rounded-full shadow-xl" style="left:50%;transform:translateX(-50%);white-space:nowrap">✨ ${esc(S.toast)}</div>`:''}
  <div class="bg-gradient-to-b ${cloudGlow()} pt-10 pb-4 px-4 transition-all duration-700">
    <div class="flex items-center justify-between mb-3">
      <div class="flex items-center gap-1.5 bg-white/70 rounded-full px-2.5 py-1 shadow-sm">
        <span>🔥</span><span class="text-sm font-black text-gray-700">${S.profile.current_streak||0} day streak</span>
      </div>
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1.5 bg-white/70 rounded-full px-2.5 py-1 shadow-sm">
          <span>⭐</span><span class="text-sm font-black text-amber-600">${S.profile.xp||0} XP</span>
        </div>
        <button onclick="handleSignOut()" title="Sign out" class="w-7 h-7 bg-white/70 rounded-full flex items-center justify-center shadow-sm text-gray-500 font-black" style="font-size:13px">↩</button>
      </div>
    </div>
    <div class="flex items-center gap-3.5">
      <div class="relative flex-shrink-0">
        <span class="text-6xl select-none" style="filter:drop-shadow(0 4px 12px rgba(147,197,253,.5))">☁️</span>
        <span class="absolute inset-0 flex items-center justify-center text-2xl pb-1.5 pointer-events-none">${cloudMood()}</span>
      </div>
      <div>
        <p class="font-black text-gray-800 text-sm">${todayStr()}</p>
        <p class="text-xs text-gray-500 font-semibold">${done}/${total} done · ${p}% complete</p>
        ${p===100&&total>0?'<p class="text-xs text-violet-600 font-black mt-0.5">✨ All done — incredible!</p>':''}
      </div>
    </div>
  </div>
  <div class="flex-1 overflow-y-auto pb-20">
    ${S.tab==='today'?rToday():S.tab==='focus'?rFocus():S.tab==='dump'?rDump():rWins()}
  </div>
  <div class="fixed bottom-0 bg-white border-t border-gray-100 flex px-2 py-2 z-40 shadow-xl" style="width:100%;max-width:384px;left:50%;transform:translateX(-50%)">
    ${TABS.map(t=>`<button onclick="S.tab='${t.id}';render()" class="flex-1 flex flex-col items-center gap-0.5 py-1 rounded-xl ${S.tab===t.id?'text-blue-500 bg-blue-50':'text-gray-400'}">
      <span style="font-size:18px">${t.icon}</span><span class="font-black" style="font-size:10px">${t.lbl}</span>
    </button>`).join('')}
  </div>
  ${S.showAdd?rAddSheet():''}`;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER
   ══════════════════════════════════════════════════════════════*/
function render(){
  const root=document.getElementById('root');if(!root)return;
  if(S.loading){root.innerHTML=rLoad();return;}
  if(!S.user){root.innerHTML=rAuth();return;}
  root.innerHTML=rApp();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════════*/
async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    S.user=session.user;
    await Promise.all([loadProfile(),loadTasks(),loadDumps()]);
  }
  S.loading=false;render();
  sb.auth.onAuthStateChange(async(_ev,session)=>{
    if(session){
      S.user=session.user;S.loading=true;render();
      await Promise.all([loadProfile(),loadTasks(),loadDumps()]);
      S.loading=false;
    }else{
      S.user=null;S.tasks=[];S.dumps=[];S.profile={xp:0,current_streak:0,longest_streak:0};S.prayerBonusPaid=false;
    }
    render();
  });
}
init();
</script>
</body>
</html>
